services:
  # バックエンド (Web Service)
  - type: web
    name: quarto-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: ALLOWED_ORIGINS
        sync: false  # Render ダッシュボードで手動設定: フロントエンドのURL

  # フロントエンド (Web Service - nginx)
  - type: web
    name: quarto-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    dockerBuildArgs:
      - key: VITE_API_BASE_URL
        sync: false  # Render ダッシュボードで手動設定: バックエンドのURL
